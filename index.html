<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .input-row button:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
    }

    .stats span {
      color: #4f46e5;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid #f0f4f8;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    li.checked .checkbox {
      background: #4f46e5;
      border-color: #4f46e5;
    }

    .checkbox::after {
      content: '';
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: none;
    }

    li.checked .checkbox::after {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      cursor: pointer;
      user-select: none;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      color: #a0aec0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:hover {
      border-color: #e53e3e;
      color: #e53e3e;
      background: #fff5f5;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요..." />
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="stats" id="stats"></div>

    <div class="loading" id="loading">불러오는 중...</div>
    <ul id="list"></ul>

    <div class="empty" id="empty" style="display:none">아직 아이템이 없습니다.</div>

    <button class="clear-btn" onclick="clearChecked()" id="clearBtn" style="display:none">
      완료된 항목 지우기
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://zohhtnbjgudaarjenirn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvaGh0bmJqZ3VkYWFyamVuaXJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MTQ3ODEsImV4cCI6MjA4ODE5MDc4MX0.THmGK4ynXKhWrUuiL70waXqwyw6S5S10117ppLpGYmg';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');
      const clearBtn = document.getElementById('clearBtn');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';

      const checked = items.filter(i => i.done).length;
      stats.innerHTML = `총 <span>${items.length}</span>개 · 완료 <span>${checked}</span>개`;
      clearBtn.style.display = checked > 0 ? 'block' : 'none';

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('checked');

        li.innerHTML = `
          <div class="checkbox" onclick="toggleItem('${item.id}', ${item.done})"></div>
          <span class="item-text" onclick="toggleItem('${item.id}', ${item.done})">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="deleteItem('${item.id}')">✕</button>
        `;
        list.appendChild(li);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadItems() {
      document.getElementById('loading').style.display = 'block';
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });

      document.getElementById('loading').style.display = 'none';

      if (error) {
        showError('데이터를 불러오는데 실패했습니다: ' + error.message);
        return;
      }

      items = data;
      render();
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const btn = document.getElementById('addBtn');
      const text = input.value.trim();
      if (!text) return;

      btn.disabled = true;
      showError('');

      const { data, error } = await db
        .from('shopping_items')
        .insert([{ text, done: false }])
        .select()
        .single();

      btn.disabled = false;

      if (error) {
        showError('추가 실패: ' + error.message);
        return;
      }

      items.unshift(data);
      render();
      input.value = '';
      input.focus();
    }

    async function toggleItem(id, currentDone) {
      showError('');
      const { error } = await db
        .from('shopping_items')
        .update({ done: !currentDone })
        .eq('id', id);

      if (error) {
        showError('수정 실패: ' + error.message);
        return;
      }

      const item = items.find(i => i.id === id);
      if (item) item.done = !currentDone;
      render();
    }

    async function deleteItem(id) {
      showError('');
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        showError('삭제 실패: ' + error.message);
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      showError('');
      const checkedIds = items.filter(i => i.done).map(i => i.id);
      if (checkedIds.length === 0) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) {
        showError('삭제 실패: ' + error.message);
        return;
      }

      items = items.filter(i => !i.done);
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
